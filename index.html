<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>EchoWalker - The Blind Audio Maze</title>
    <!-- Google Fonts: Outfit -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
  </head>
  <body>
    <!-- Animated Background -->
    <div class="background-animation">
        <div class="pulse-ring"></div>
        <div class="pulse-ring delay"></div>
    </div>

    <!-- Start Screen -->
    <div id="startScreen" class="ui-screen fade-up">
      <div class="glass-panel">
        <div class="icon-header">🌊</div>
        <h1>ECHOWALKER</h1>
        <p class="subtitle">Navigate using sound alone</p>
        <button id="startBtn" class="primary-btn">INITIALIZE SONAR</button>
      </div>
    </div>

    <!-- Level Select Screen -->
    <div id="levelSelect" class="ui-screen hidden">
      <div class="glass-panel">
        <h2>SELECT DIFFICULTY</h2>
        <div class="difficulty-grid">
          <button class="difficulty-btn demo" data-level="demo">DEMO <span class="size-badge">7×7</span></button>
          <button class="difficulty-btn easy" data-level="easy">EASY <span class="size-badge">11×11</span></button>
          <button class="difficulty-btn medium" data-level="medium">MEDIUM <span class="size-badge">15×15</span></button>
          <button class="difficulty-btn hard" data-level="hard">HARD <span class="size-badge">21×21</span></button>
        </div>
      </div>
    </div>

    <!-- Game HUD -->
    <div id="gameHUD" class="ui-screen hidden" style="pointer-events: none; z-index: 5;">
      <div class="hud-top-left">
        <div class="hud-item">MODE: <span id="hud-mode" class="hud-highlight">WALK</span></div>
        <div class="hud-item hud-small">SONAR: <span id="hud-ping">READY</span></div>
      </div>
      <div class="hud-bottom-right">
        [M] MAP | [SPACE] SONAR | [Q] SPEED | [WASD] MOVE
      </div>
      <div class="vignette"></div>
    </div>

    <!-- Victory Screen -->
    <div id="victoryScreen" class="ui-screen hidden">
      <div class="glass-panel victory-panel">
        <div class="icon-header victory-icon">🎉</div>
        <h2>VICTORY!</h2>
        <p class="subtitle">Signal Intercepted & Extraction Complete</p>
        <div id="stats" class="stats-container"></div>
        <button id="restartBtn" class="primary-btn">PLAY AGAIN</button>
      </div>
    </div>
    
    <script>
    // Load Best Times
    window.updateBestTimeUI = function() {
        document.querySelectorAll('.difficulty-btn').forEach(btn => {
            const level = btn.getAttribute('data-level');
            const bestTime = localStorage.getItem('echo_best_' + level);
            
            // Remove existing record div if it exists
            const existing = btn.querySelector('.best-time-display');
            if (existing) existing.remove();
            
            if (bestTime) {
                const bestDiv = document.createElement('div');
                bestDiv.className = 'best-time-display';
                bestDiv.style.cssText = 'font-size: 14px; margin-top: 8px; color: #0ff; text-shadow: 0 0 5px rgba(0,255,255,0.5); letter-spacing: 1px; font-weight: 600;';
                bestDiv.innerHTML = `🏆 BEST: ${bestTime}s`;
                btn.appendChild(bestDiv);
            }
        });
    };
    updateBestTimeUI();

    // UI Screen Logic (Modernized)
    document.getElementById('startBtn').addEventListener('click', () => {
      if (typeof initAudio === 'function' && !window.audioEngineStarted) {
          initAudio();
          window.audioEngineStarted = true;
          if (typeof playPowerUpSound === 'function') playPowerUpSound();
      }
      
      document.getElementById('startScreen').classList.add('fade-out');
      setTimeout(() => {
          document.getElementById('startScreen').classList.add('hidden');
          const levelSelect = document.getElementById('levelSelect');
          levelSelect.classList.remove('hidden');
          levelSelect.classList.add('fade-up');
      }, 300);
    });

    document.querySelectorAll('.difficulty-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.getElementById('levelSelect').classList.add('fade-out');
        setTimeout(() => {
            document.getElementById('levelSelect').classList.add('hidden');
            const level = btn.getAttribute('data-level');
            if (typeof startGame === 'function') startGame(level);
        }, 300);
      });
    });

    document.getElementById('restartBtn').addEventListener('click', () => {
      const victoryScreen = document.getElementById('victoryScreen');
      victoryScreen.classList.add('fade-out');
      setTimeout(() => {
          victoryScreen.classList.add('hidden');
          victoryScreen.classList.remove('fade-out', 'fade-up');
          
          const levelSelect = document.getElementById('levelSelect');
          levelSelect.classList.remove('hidden', 'fade-out');
          levelSelect.classList.add('fade-up');
      }, 300);
    });
    
    console.log('Premium UI Screens loaded');
    </script>

    <!-- Core Scripts -->
    <script src="js/utils/raycasting.js"></script>
    <script src="js/maze.js"></script>
    <script src="js/audio/audioEngine.js"></script>
    <script src="js/audio/oceanWaves.js"></script>
    <script src="js/audio/sonar.js"></script>
    <script src="js/audio/sounds.js"></script>
    <script src="js/player.js"></script>
    <script src="js/game.js"></script>
  </body>
</html>
